<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">

  <!-- Transparent background -->

  <g transform="translate(16, 16)">

    <!-- Crystal body — three isometric faces -->
    <polygon points="0,-8 7,-4 0,0 -7,-4" fill="#4DD0E1"/>
    <polygon points="-7,-4 0,0 0,8 -7,4" fill="#00838F"/>
    <polygon points="7,-4 0,0 0,8 7,4" fill="#80DEEA"/>

    <!-- Outline -->
    <polygon points="0,-8 7,-4 7,4 0,8 -7,4 -7,-4"
             fill="none" stroke="#004D40" stroke-width="0.6"/>

    <!-- Casual Monet dots — varied sizes, asymmetric positions -->
    <circle cx="-10" cy="-6" r="1.8" fill="#B39DDB" opacity="0.8"/>
    <circle cx="-9" cy="2" r="0.8" fill="#CE93D8" opacity="0.6"/>
    <circle cx="-7" cy="8" r="1.2" fill="#E1BEE7" opacity="0.55"/>
    <circle cx="-4" cy="-10" r="0.6" fill="#F8BBD0" opacity="0.65"/>

    <circle cx="9" cy="-8" r="1" fill="#CE93D8" opacity="0.7"/>
    <circle cx="10" cy="0" r="1.6" fill="#B39DDB" opacity="0.6"/>
    <circle cx="8" cy="7" r="0.5" fill="#F8BBD0" opacity="0.55"/>
    <circle cx="5" cy="-10" r="1.3" fill="#E1BEE7" opacity="0.5"/>

  </g>

</svg>
